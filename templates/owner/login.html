{% extends 'store/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4" style="border-top: 4px solid var(--accent-color);">
                <h2 class="text-center mb-4">Owner Login</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Login</button>
                </form>
                
                <p class="text-center text-muted">
                    <a href="{% url 'home' %}">Back to Website</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
